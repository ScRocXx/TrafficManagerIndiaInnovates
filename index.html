<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MCD Command | Northern Blades</title>
    <style>
        :root {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Global Header */
        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .system-status {
            font-size: 0.8rem;
            background: #1e293b;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        /* MACRO VIEW STYLES */
        #macro-view {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            height: calc(100vh - 120px);
        }

        .node-grid {
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .node-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .node-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.1);
        }

        .node-card.offline {
            border-color: var(--red);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        .node-info h3 {
            margin: 0;
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            pointer-events: none;
        }

        .lane-status-mini {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            margin-top: 10px;
            pointer-events: none;
        }

        .lane-dot {
            padding: 4px;
            border-radius: 4px;
            font-size: 0.6rem;
            text-align: center;
            background: #0f172a;
            border: 1px solid #334155;
        }

        .lane-dot.is-green {
            background: var(--green);
            color: black;
            font-weight: bold;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        .stat-box {
            flex: 1;
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mini-map {
            background: #000;
            border-radius: 12px;
            height: 200px;
            border: 1px solid #334155;
            position: relative;
            padding: 10px;
            text-align: center;
        }

        .map-node {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            position: absolute;
        }

        .map-line {
            position: absolute;
            background: #334155;
            width: 2px;
        }

        .logic-stream {
            flex: 1;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
        }

        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e293b;
            line-height: 1.4;
        }

        .log-time {
            color: #475569;
            margin-right: 5px;
        }

        .tag {
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: bold;
            margin-right: 5px;
        }

        /* MICRO VIEW STYLES */
        #micro-view {
            display: none;
            width: 100%;
            max-width: 1000px;
        }

        .micro-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-back {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .micro-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .micro-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .micro-card.green {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.05);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
        }

        .micro-card.offline {
            border-color: var(--red);
            background: rgba(239, 68, 68, 0.05);
        }

        .micro-title {
            font-size: 1.1rem;
            color: #94a3b8;
            letter-spacing: 2px;
        }

        .micro-pressure {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
            color: #f8fafc;
        }

        .timer-display {
            background: rgba(0, 0, 0, 0.6);
            margin-top: 15px;
            padding: 8px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .wait-critical {
            color: var(--red);
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        .offline-timer {
            color: #f59e0b;
            font-weight: bold;
        }

        .green-text {
            color: var(--green);
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* Scroller Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo-text">NORTHERN BLADES | FLUID ENGINE v2.0</div>
        <div class="system-status" id="sys-clock">MACRO-GRID CONNECTED | 12.03.2026</div>
    </div>

    <div id="macro-view">
        <div class="node-grid" id="node-container">
        </div>

        <div class="sidebar">
            <div class="mini-map">
                <span style="font-size: 0.7rem; color: #475569;">INTER-NODE TOPOLOGY</span>
                <div class="map-node" style="top: 30px; left: 50%;" title="Minto Bridge"></div>
                <div class="map-line" style="top: 40px; left: 51%; height: 50px;"></div>
                <div class="map-node" style="top: 90px; left: 50%;" title="Ashram Chowk"></div>
                <div class="map-line" style="top: 100px; left: 51%; height: 50px;"></div>
                <div class="map-node" style="top: 150px; left: 50%;" title="AIIMS Junction"></div>
            </div>

            <div class="logic-stream" id="log-panel">
                <div class="log-entry"><span class="log-time">[LIVE]</span> <span class="tag"
                        style="background:#475569">SYS</span> Initializing Macro-Grid interlink... System Ready.</div>
            </div>
        </div>
    </div>

    <div id="micro-view">
        <div class="micro-controls">
            <button class="btn-back" onclick="switchView('macro')">🔙 BACK TO MACRO GRID</button>
            <h2 id="micro-header-title" style="margin: 0; color: var(--accent); letter-spacing: 1px;">NODE COMMAND</h2>
            <div class="system-status" id="micro-env-stats">NET: ONLINE | VIS: 100%</div>
        </div>

        <div class="micro-grid">
            <div class="micro-card" id="card-north">
                <div class="micro-title">NORTH</div>
                <div class="micro-pressure" id="score-north">0</div>
                <div class="timer-display" id="time-north">WAIT: 0s / 60s MAX</div>
            </div>
            <div class="micro-card" id="card-south">
                <div class="micro-title">SOUTH</div>
                <div class="micro-pressure" id="score-south">0</div>
                <div class="timer-display" id="time-south">WAIT: 0s / 60s MAX</div>
            </div>
            <div class="micro-card" id="card-east">
                <div class="micro-title">EAST</div>
                <div class="micro-pressure" id="score-east">0</div>
                <div class="timer-display" id="time-east">WAIT: 0s / 60s MAX</div>
            </div>
            <div class="micro-card" id="card-west">
                <div class="micro-title">WEST</div>
                <div class="micro-pressure" id="score-west">0</div>
                <div class="timer-display" id="time-west">WAIT: 0s / 60s MAX</div>
            </div>
        </div>
    </div>

    <script>
        const logPanel = document.getElementById('log-panel');
        const nodeContainer = document.getElementById('node-container');

        // View State Management
        let currentView = 'macro';
        let selectedNodeId = null;
        let lastFlags = {};

        function switchView(view, nodeId = null) {
            currentView = view;
            selectedNodeId = nodeId;

            if (view === 'macro') {
                document.getElementById('macro-view').style.display = 'grid';
                document.getElementById('micro-view').style.display = 'none';
            } else {
                document.getElementById('macro-view').style.display = 'none';
                document.getElementById('micro-view').style.display = 'block';
                document.getElementById('micro-header-title').innerText = nodeId.replace('_', ' ').toUpperCase() + ' COMMAND';
                updateDashboard(); // Force immediate render
            }
        }

        function addLog(msg, typeTag = "SYS", colorClass = "") {
            const time = new Date().toLocaleTimeString();
            let bg = typeTag === 'V2X' ? '#ef4444' : typeTag === 'MACRO' ? '#eab308' : typeTag === 'OPT' ? '#38bdf8' : '#475569';
            let txtColor = (typeTag === 'MACRO' || typeTag === 'OPT') ? 'black' : 'white';

            logPanel.innerHTML += `<div class="log-entry">
            <span class="log-time">[${time}]</span>
            <span class="tag" style="background:${bg}; color:${txtColor}">${typeTag}</span>
            <span class="${colorClass}">${msg}</span>
        </div>`;
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        async function updateDashboard() {
            try {
                const res = await fetch('http://127.0.0.1:8000/api/v1/network/status');
                const data = await res.json();

                // 1. MACRO VIEW RENDERING
                if (currentView === 'macro') {
                    nodeContainer.innerHTML = '';

                    for (const [nodeId, node] of Object.entries(data)) {
                        const f = node.flags;
                        const cleanName = nodeId.replace('_', ' ');

                        // Global Logging Engine
                        if (f.v2x && lastFlags[nodeId]?.v2x !== f.v2x) addLog(`Ambulance detected at ${cleanName}. Clearing Green Corridor.`, "V2X", "red");
                        if (f.neighbor_flood && lastFlags[nodeId]?.neighbor_flood !== f.neighbor_flood) addLog(`${cleanName} rerouting traffic: Neighbor [${f.neighbor_flood.replace('_', ' ')}] reported flooding.`, "MACRO", "yellow");
                        if (f.transit && node.current_green && node.current_green.includes(f.transit.toUpperCase()) && lastFlags[nodeId]?.transit !== f.transit) addLog(`${cleanName} applying MTMC Momentum Extension for Bus.`, "OPT", "blue");
                        if (f.net === "OFFLINE" && lastFlags[nodeId]?.net !== "OFFLINE") addLog(`CRITICAL: ${cleanName} Cloud link lost. Switching to 60s Analog Island Mode.`, "SYS", "red");

                        if (!lastFlags[nodeId]) lastFlags[nodeId] = {};
                        lastFlags[nodeId] = f;

                        // Build Clickable Macro Cards
                        const card = document.createElement('div');
                        card.className = `node-card ${f.net === "OFFLINE" ? 'offline' : ''}`;
                        card.onclick = () => switchView('micro', nodeId); // CLICK TO DRILL DOWN

                        let laneDots = '';
                        ['north', 'south', 'east', 'west'].forEach(l => {
                            const isGreen = node.current_green && node.current_green.toLowerCase().includes(l);
                            laneDots += `<div class="lane-dot ${isGreen ? 'is-green' : ''}">${l.toUpperCase()}</div>`;
                        });

                        card.innerHTML = `
                        <div class="node-info">
                            <h3>${cleanName}</h3>
                            <div class="lane-status-mini">${laneDots}</div>
                            <div style="margin-top:15px; font-size:0.6rem; color:#64748b;">
                                STAT: <span style="color:${f.net === 'OFFLINE' ? '#ef4444' : '#22c55e'}">${f.net}</span> | VIS: ${f.vis}%
                            </div>
                        </div>
                        <div class="telemetry-row">
                            <div class="stat-box">
                                <span class="stat-val" style="color:${f.flood ? '#ef4444' : 'white'}">${f.flood ? 'FLOOD' : 'OK'}</span>
                                <span class="stat-label">LOCAL ENV</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-val" style="color:var(--accent)">${f.net === "OFFLINE" ? node.island_time + 's' : 'AI'}</span>
                                <span class="stat-label">${f.net === "OFFLINE" ? 'FAILSAFE' : 'CONTROL'}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-val" style="font-size: 1.2rem; color: var(--green);">${node.current_green ? node.current_green.split(' ')[0] : 'IDLE'}</span>
                                <span class="stat-label">ACTIVE LANE</span>
                            </div>
                        </div>
                    `;
                        nodeContainer.appendChild(card);
                    }
                }

                // 2. MICRO VIEW RENDERING (The Detailed Drill-Down)
                else if (currentView === 'micro' && data[selectedNodeId]) {
                    const node = data[selectedNodeId];
                    const f = node.flags;

                    // Update Micro Header
                    let vis = f.vis < 30 ? `<span style="color:#eab308">${f.vis}% (ACOUSTIC)</span>` : `${f.vis}% (OPTICAL)`;
                    let net = f.net === "OFFLINE" ? `<span style="color:#ef4444">OFFLINE (ISLAND MODE)</span>` : `<span class="green-text">ONLINE</span>`;
                    document.getElementById('micro-env-stats').innerHTML = `NET: ${net} | VIS: ${vis}`;

                    // Update Micro 4-Lane Grid
                    ['north', 'south', 'east', 'west'].forEach(l => {
                        document.getElementById(`score-${l}`).innerText = node.pressures[l] || 0;
                        let c = document.getElementById(`card-${l}`);
                        let t = document.getElementById(`time-${l}`);

                        let isGreen = node.current_green && node.current_green.toLowerCase().includes(l);

                        if (f.net === "OFFLINE") {
                            c.classList.add('offline');
                            if (isGreen) {
                                c.classList.add('green');
                                t.innerHTML = `<span class="offline-timer">🔒 FIXED FLOW: ${node.island_time}s LEFT</span>`;
                            } else {
                                c.classList.remove('green');
                                t.innerHTML = `<span style="color:#ef4444">🔒 HARDWARE CYCLE WAITING</span>`;
                            }
                        } else {
                            c.classList.remove('offline');
                            if (isGreen) {
                                c.classList.add('green');
                                let estTime = Math.ceil((node.densities[l] || 0) * 0.4);
                                if (estTime === 0) estTime = 5;
                                t.innerHTML = `<span class="green-text">🟢 FLOWING (Est. Clearance: ${estTime}s)</span>`;
                            } else {
                                c.classList.remove('green');
                                let wait = node.wait_times[l] || 0;
                                if (wait >= 45) {
                                    t.innerHTML = `<span class="wait-critical">🔴 WAIT: ${wait}s / 60s MAX (CAP IMMINENT)</span>`;
                                } else {
                                    t.innerHTML = `<span style="color:#94a3b8">🔴 WAIT: ${wait}s / 60s MAX</span>`;
                                }
                            }
                        }
                    });
                }

            } catch (e) { }
        }

        setInterval(updateDashboard, 500);
    </script>
</body>

</html>
